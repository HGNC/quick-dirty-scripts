services:
  mysql:
    image: mysql:8.4
    container_name: vgnc-uniprot-backfill-mysql-test
    environment:
      MYSQL_DATABASE: vgnc_public
      MYSQL_USER: vgnc
      MYSQL_PASSWORD: vgnc
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s
